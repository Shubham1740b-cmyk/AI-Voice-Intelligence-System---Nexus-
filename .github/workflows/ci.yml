name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  OPENROUTER_API_KEY: sk-or-ci-test-key
  OPENROUTER_MODEL: anthropic/claude-sonnet-4
  Nexus_DEMO_MODE: "true"

jobs:
  test:
    name: Test & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Vercel API module
        run: python -c "from api.index import app; print(app.title)"

      - name: Verify config loads
        run: python -c "from config import get_config; print(get_config().openrouter_model)"

      - name: Run tests
        run: pytest tests.py -v --tb=short

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t nexus:ci .

      - name: Test Docker image
        run: docker run --rm nexus:ci python -c "from config import get_config; print('Docker OK')"
